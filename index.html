<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <title>画像ARビューアー（位置調整版）</title>
    
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; }
        /* 撮影ボタンのスタイル */
        #snap-btn {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 75px;
            height: 75px;
            background-color: rgba(255, 255, 255, 0.6);
            border: 6px solid #fff;
            border-radius: 50%;
            z-index: 999;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.4);
            transition: all 0.2s ease;
        }
        #snap-btn:active {
            background-color: rgba(255, 255, 255, 0.9);
            transform: translateX(-50%) scale(0.9);
        }
    </style>
</head>
<body>

    <button id="snap-btn" title="写真を撮影"></button>

    <a-scene 
        embedded 
        arjs="sourceType: webcam; debugUIEnabled: false;" 
        renderer="preserveDrawingBuffer: true; antialias: true; alpha: true;">
        
        <a-assets>
            <img id="sakura-img" src="sakura.png">
        </a-assets>

        <a-image 
            id="ar-object"
            src="#sakura-img" 
            position="0 0 -4" 
            width="2" 
            height="2">
        </a-image>

        <a-entity camera></a-entity>
    </a-scene>

    <script>
        // ==========================================
        // 1. 指での操作（回転・拡大縮小）の独自実装
        // ==========================================
        const arObject = document.getElementById('ar-object');
        let initialTouchDist = 0;
        let initialScale = { x: 2, y: 2 }; // 初期サイズ
        let initialTouchX = 0;
        let initialRotation = 0;

        window.addEventListener('touchstart', function(e) {
            if (e.touches.length === 1) {
                // 1本指の場合：回転の準備
                initialTouchX = e.touches[0].clientX;
                initialRotation = arObject.getAttribute('rotation').y;
            } else if (e.touches.length === 2) {
                // 2本指の場合：拡大縮小の準備
                initialTouchDist = Math.hypot(
                    e.touches[0].clientX - e.touches[1].clientX,
                    e.touches[0].clientY - e.touches[1].clientY
                );
                const currentScale = arObject.getAttribute('scale') || { x: 1, y: 1, z: 1 };
                initialScale = { x: currentScale.x, y: currentScale.y };
            }
        });

        window.addEventListener('touchmove', function(e) {
            if (e.touches.length === 1 && initialTouchX !== 0) {
                // 1本指スワイプ：水平回転（Y軸回転）
                const deltaX = e.touches[0].clientX - initialTouchX;
                // 感度調整（0.5）
                const newRotation = initialRotation + deltaX * 0.5;
                arObject.setAttribute('rotation', `0 ${newRotation} 0`);
            } else if (e.touches.length === 2 && initialTouchDist !== 0) {
                // 2本指ピンチ：拡大縮小
                const currentDist = Math.hypot(
                    e.touches[0].clientX - e.touches[1].clientX,
                    e.touches[0].clientY - e.touches[1].clientY
                );
                const factor = currentDist / initialTouchDist;
                
                // 最小0.2倍、最大5倍の範囲に制限
                let newScaleX = Math.max(0.2, Math.min(5.0, initialScale.x * factor));
                let newScaleY = Math.max(0.2, Math.min(5.0, initialScale.y * factor));
                
                arObject.setAttribute('scale', `${newScaleX} ${newScaleY} 1`);
            }
        });

        window.addEventListener('touchend', function(e) {
            if (e.touches.length < 2) initialTouchDist = 0;
            if (e.touches.length < 1) initialTouchX = 0;
        });


        // ==========================================
        // 2. 写真撮影（キャプチャ）の処理
        // ==========================================
        document.getElementById('snap-btn').addEventListener('click', function() {
            const scene = document.querySelector('a-scene');
            
            if (!scene.components.screenshot) {
                alert('AR機能の読み込み中です。数秒待ってからもう一度押してください。');
                return;
            }
            
            const targetCanvas = scene.components.screenshot.getCanvas('perspective');
            const video = document.querySelector('video');

            if (!video) {
                alert('カメラ映像が取得できません。');
                return;
            }

            const mergeCanvas = document.createElement('canvas');
            const width = window.innerWidth;
            const height = window.innerHeight;
            mergeCanvas.width = width;
            mergeCanvas.height = height;
            const ctx = mergeCanvas.getContext('2d');

            // カメラ映像をスマホ画面（縦向き）に合わせてトリミング描画
            const videoWidth = video.videoWidth;
            const videoHeight = video.videoHeight;
            const videoAspectRatio = videoWidth / videoHeight;
            const canvasAspectRatio = width / height;

            let drawWidth, drawHeight, drawX, drawY;
            if (videoAspectRatio > canvasAspectRatio) {
                drawHeight = height;
                drawWidth = drawHeight * videoAspectRatio;
                drawX = (width - drawWidth) / 2;
                drawY = 0;
            } else {
                drawWidth = width;
                drawHeight = drawWidth / videoAspectRatio;
                drawX = 0;
                drawY = (height - drawHeight) / 2;
            }
            ctx.drawImage(video, drawX, drawY, drawWidth, drawHeight);

            // その上にARオブジェクトを合成
            ctx.drawImage(targetCanvas, 0, 0, width, height);

            try {
                // 一部のブラウザ向けのタイポ修正（toToDataURL -> toDataURL）
                const imgData = mergeCanvas.toDataURL('image/png');
                const link = document.createElement('a');
                link.download = 'ar-photo_' + Date.now() + '.png';
                link.href = imgData;
                link.click();
            } catch (e) {
                // ダウンロードがブロックされた場合の対応（別タブ展開）
                try {
                    const imgData = mergeCanvas.toDataURL('image/png');
                    const newTab = window.open();
                    newTab.document.body.innerHTML = `<img src="${imgData}" style="width:100%;">`;
                } catch(err) {
                    alert('自動保存が制限されました。スマートフォンのスクリーンショット機能で撮影してください。');
                }
            }
        });
    </script>
</body>
</html>
