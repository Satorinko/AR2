<!DOCTYPE html> 
<html lang="ja"> 
<head> 
<meta charset="UTF-8"> 
<meta name="viewport" content="width=device-width, initial-scale=1.0"> 
<title>簡単ARビューアー</title> 
<script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script> 
<style> 
body { margin: 0; padding: 0; width: 100vw; height: 100vh; overflow: hidden; } 
model-viewer { width: 100%; height: 100%; background-color: #f0f0f0; } 
</style> 
</head> 
<body> 
 
<model-viewer  
src="sakura.png"  
ar  
ar-modes="webxr scene-viewer quick-look"  
camera-controls  
touch-action="none"  
alt="モデルのAR表示"> 
 
<button slot="ar-button" style="background-color: white; border-radius: 4px; border: none; position: absolute; bottom: 16px; right: 16px; padding: 12px;"> 
👋 部屋に置く（AR起動） 
</button> 
</model-viewer> 
 
</body> 
</html>
