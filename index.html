<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <title>画像ARビューアー（ドラッグ移動・快適操作版）</title>
    
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; }
        /* 撮影ボタンのスタイル */
        #snap-btn {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 75px;
            height: 75px;
            background-color: rgba(255, 255, 255, 0.6);
            border: 6px solid #fff;
            border-radius: 50%;
            z-index: 999;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.4);
            transition: all 0.2s ease;
        }
        #snap-btn:active {
            background-color: rgba(255, 255, 255, 0.9);
            transform: translateX(-50%) scale(0.9);
        }
    </style>
</head>
<body>

    <button id="snap-btn" title="写真を撮影"></button>

    <a-scene 
        embedded 
        arjs="sourceType: webcam; debugUIEnabled: false;" 
        renderer="preserveDrawingBuffer: true; antialias: true; alpha: true;">
        
        <a-assets>
            <img id="sakura-img" src="sakura.png">
        </a-assets>

        <a-image 
            id="ar-object"
            src="#sakura-img" 
            position="0 0 -4" 
            width="2" 
            height="2">
        </a-image>

        <a-entity camera></a-entity>
    </a-scene>

    <script>
        // ==========================================
        // 1. 新・指での操作（1本指移動・2本指回転＆拡大）
        // ==========================================
        const arObject = document.getElementById('ar-object');
        
        // 状態管理用変数
        let startX = 0, startY = 0;
        let startObjX = 0, startObjY = 0;
        
        let startDist = 0;
        let startScaleX = 1, startScaleY = 1;
        
        let startAngle = 0;
        let startRotationY = 0;

        window.addEventListener('touchstart', function(e) {
            if (e.touches.length === 1) {
                // 【1本指】移動の開始位置を記録
                startX = e.touches[0].clientX;
                startY = e.touches[0].clientY;
                const currentPos = arObject.getAttribute('position') || { x: 0, y: 0, z: -4 };
                startObjX = currentPos.x;
                startObjY = currentPos.y;
            } 
            else if (e.touches.length === 2) {
                // 【2本指】拡大縮小の準備
                startDist = Math.hypot(
                    e.touches[0].clientX - e.touches[1].clientX,
                    e.touches[0].clientY - e.touches[1].clientY
                );
                const currentScale = arObject.getAttribute('scale') || { x: 1, y: 1, z: 1 };
                startScaleX = currentScale.x;
                startScaleY = currentScale.y;

                // 【2本指】回転の準備
                startAngle = Math.atan2(
                    e.touches[1].clientY - e.touches[0].clientY,
                    e.touches[1].clientX - e.touches[0].clientX
                ) * 180 / Math.PI;
                const currentRot = arObject.getAttribute('rotation') || { x: 0, y: 0, z: 0 };
                startRotationY = currentRot.y;
            }
        });

        window.addEventListener('touchmove', function(e) {
            if (e.touches.length === 1 && startX !== 0) {
                // 【1本指スワイプ】上下左右の移動
                const deltaX = e.touches[0].clientX - startX;
                const deltaY = e.touches[0].clientY - startY;
                
                // 画面上のピクセル移動量をAR空間の距離に変換（0.0075は移動の滑らかさ調整）
                const newX = startObjX + (deltaX * 0.0075);
                const newY = startObjY - (deltaY * 0.0075); // Y軸は上下反転
                
                arObject.setAttribute('position', `${newX} ${newY} -4`);
            } 
            else if (e.touches.length === 2) {
                // 【2本指ピンチ】拡大縮小
                if (startDist !== 0) {
                    const currentDist = Math.hypot(
                        e.touches[0].clientX - e.touches[1].clientX,
                        e.touches[0].clientY - e.touches[1].clientY
                    );
                    const factor = currentDist / startDist;
                    let newScaleX = Math.max(0.2, Math.min(5.0, startScaleX * factor));
                    let newScaleY = Math.max(0.2, Math.min(5.0, startScaleY * factor));
                    arObject.setAttribute('scale', `${newScaleX} ${newScaleY} 1`);
                }

                // 【2本指ツイスター】回転（ひねる操作）
                const currentAngle = Math.atan2(
                    e.touches[1].clientY - e.touches[0].clientY,
                    e.touches[1].clientX - e.touches[0].clientX
                ) * 180 / Math.PI;
                const deltaAngle = currentAngle - startAngle;
                const newRotationY = startRotationY - deltaAngle; // ひねった角度分だけ回転
                arObject.setAttribute('rotation', `0 ${newRotationY} 0`);
            }
        });

        window.addEventListener('touchend', function(e) {
            if (e.touches.length < 2) {
                startDist = 0;
                startAngle = 0;
            }
            if (e.touches.length < 1) {
                startX = 0;
                startY = 0;
            }
        });


        // ==========================================
        // 2. 写真撮影（キャプチャ）の処理
        // ==========================================
        document.getElementById('snap-btn').addEventListener('click', function() {
            const scene = document.querySelector('a-scene');
            
            if (!scene.components.screenshot) {
                alert('AR機能の読み込み中です。数秒待ってからもう一度押してください。');
                return;
            }
            
            const targetCanvas = scene.components.screenshot.getCanvas('perspective');
            const video = document.querySelector('video');

            if (!video) {
                alert('カメラ映像が取得できません。');
                return;
            }

            const mergeCanvas = document.createElement('canvas');
            const width = window.innerWidth;
            const height = window.innerHeight;
            mergeCanvas.width = width;
            mergeCanvas.height = height;
            const ctx = mergeCanvas.getContext('2d');

            const videoWidth = video.videoWidth;
            const videoHeight = video.videoHeight;
            const videoAspectRatio = videoWidth / videoHeight;
            const canvasAspectRatio = width / height;

            let drawWidth, drawHeight, drawX, drawY;
            if (videoAspectRatio > canvasAspectRatio) {
                drawHeight = height;
                drawWidth = drawHeight * videoAspectRatio;
                drawX = (width - drawWidth) / 2;
                drawY = 0;
            } else {
                drawWidth = width;
                drawHeight = drawWidth / videoAspectRatio;
                drawX = 0;
                drawY = (height - drawHeight) / 2;
            }
            ctx.drawImage(video, drawX, drawY, drawWidth, drawHeight);
            ctx.drawImage(targetCanvas, 0, 0, width, height);

            try {
                const imgData = mergeCanvas.toDataURL('image/png');
                const link = document.createElement('a');
                link.download = 'ar-photo_' + Date.now() + '.png';
                link.href = imgData;
                link.click();
            } catch (e) {
                try {
                    const imgData = mergeCanvas.toDataURL('image/png');
                    const newTab = window.open();
                    newTab.document.body.innerHTML = `<img src="${imgData}" style="width:100%;">`;
                } catch(err) {
                    alert('自動保存が制限されました。スマートフォンのスクリーンショット機能で撮影してください。');
                }
            }
        });
    </script>
</body>
</html>
