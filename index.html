<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <title>画像ARビューアー（操作・撮影修正版）</title>
    
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    
    <script src="https://raw.githack.com/fcor/arjs-gestures/master/dist/gestures.js"></script>
    
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; }
        /* 撮影ボタンのスタイル */
        #snap-btn {
            position: fixed;
            bottom: 30px; /* 少し上に調整 */
            left: 50%;
            transform: translateX(-50%);
            width: 75px;
            height: 75px;
            background-color: rgba(255, 255, 255, 0.6); /* 少し透過を強めに */
            border: 6px solid #fff;
            border-radius: 50%;
            z-index: 999;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.4);
            transition: all 0.2s ease; /* アニメーション追加 */
        }
        #snap-btn:active {
            background-color: rgba(255, 255, 255, 0.9);
            transform: translateX(-50%) scale(0.9); /* タップ時に少し小さく */
        }
    </style>
</head>
<body>

    <button id="snap-btn" title="写真を撮影"></button>

    <a-scene 
        embedded 
        arjs="sourceType: webcam; debugUIEnabled: false; trackingMethod: best;" 
        renderer="preserveDrawingBuffer: true; antialias: true; alpha: true;"
        gesture-detector> <a-assets>
            <img id="sakura-img" src="sakura.png">
        </a-assets>

        <a-image 
            src="#sakura-img" 
            position="0 1.2 -4" /* 位置を少し調整 */
            width="2" 
            height="2" 
            class="clickable"
            gesture-handler="minScale: 0.1; maxScale: 10; rotationFactor: 2">
        </a-image>

        <a-entity camera></a-entity>
    </a-scene>

    <script>
        // 写真撮影（キャプチャ）の処理
        document.getElementById('snap-btn').addEventListener('click', function() {
            const scene = document.querySelector('a-scene');
            // A-Frameのスクリーンショットコンポーネントからキャンバスを取得（画質向上のため perspective を使用）
            const targetCanvas = scene.components.screenshot.getCanvas('perspective');
            const video = document.querySelector('video');

            if (!video) {
                alert('カメラ映像が見つかりません。サイトのカメラ権限を許可してください。');
                return;
            }

            // 合成用のキャンバスを作成。サイズをスマホ画面の解像度に合わせる
            const mergeCanvas = document.createElement('canvas');
            // 高画質で保存するため、実解像度（devicePixelRatio）を考慮
            const dpr = window.devicePixelRatio || 1;
            mergeCanvas.width = scene.addRedrawAtElement.clientWidth * dpr;
            mergeCanvas.height = scene.addRedrawAtElement.clientHeight * dpr;
            const ctx = mergeCanvas.getContext('2d');

            // 1. 背景のカメラ映像を描画（アスペクト比を保って画面いっぱいに描画）
            const videoWidth = video.videoWidth;
            const videoHeight = video.videoHeight;
            const videoAspectRatio = videoWidth / videoHeight;
            const canvasAspectRatio = mergeCanvas.width / mergeCanvas.height;

            let drawWidth, drawHeight, drawX, drawY;
            if (videoAspectRatio > canvasAspectRatio) {
                // ビデオの方が横長の場合、高さを合わせて横をカット
                drawHeight = mergeCanvas.height;
                drawWidth = drawHeight * videoAspectRatio;
                drawX = (mergeCanvas.width - drawWidth) / 2;
                drawY = 0;
            } else {
                // ビデオの方が縦長（または同じ）の場合、幅を合わせて縦をカット
                drawWidth = mergeCanvas.width;
                drawHeight = drawWidth / videoAspectRatio;
                drawX = 0;
                drawY = (mergeCanvas.height - drawHeight) / 2;
            }
            ctx.drawImage(video, drawX, drawY, drawWidth, drawHeight);

            // 2. その上にAR画像を描画（画面サイズに合わせて描画）
            ctx.drawImage(targetCanvas, 0, 0, mergeCanvas.width, mergeCanvas.height);

            // データURLに変換してダウンロード
            try {
                const imgData = mergeCanvas.toDataURL('image/png');
                const link = document.createElement('a');
                link.download = 'ar-photo_' + Date.now() + '.png';
                link.href = imgData;
                link.click();
            } catch (e) {
                alert('ブラウザのセキュリティ制限により、画像を保存できませんでした。画面のスクリーンショットをお試しください。');
                console.error(e);
            }
        });
    </script>
</body>
</html>
