<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <title>画像ARビューアー（完全版）</title>
    
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    
    <script src="https://raw.githack.com/fcor/arjs-gestures/master/dist/gestures.js"></script>
    
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; }
        /* 撮影ボタンのスタイル */
        #snap-btn {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 75px;
            height: 75px;
            background-color: rgba(255, 255, 255, 0.6);
            border: 6px solid #fff;
            border-radius: 50%;
            z-index: 999;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.4);
            transition: all 0.2s ease;
        }
        #snap-btn:active {
            background-color: rgba(255, 255, 255, 0.9);
            transform: translateX(-50%) scale(0.9);
        }
    </style>
</head>
<body>

    <button id="snap-btn" title="写真を撮影"></button>

    <a-scene 
        embedded 
        arjs="sourceType: webcam; debugUIEnabled: false; trackingMethod: best;" 
        renderer="preserveDrawingBuffer: true; antialias: true; alpha: true;"
        gesture-detector> <a-assets>
            <img id="sakura-img" src="sakura.png">
        </a-assets>

        <a-image 
            src="#sakura-img" 
            position="0 1.2 -4"
            width="2" 
            height="2" 
            class="clickable"
            gesture-handler="minScale: 0.2; maxScale: 5.0; rotationFactor: 2">
        </a-image>

        <a-entity camera raycaster="objects: .clickable" cursor="fuse: false; rayOrigin: mouse;"></a-entity>
    </a-scene>

    <script>
        // 写真撮影（キャプチャ）の処理
        document.getElementById('snap-btn').addEventListener('click', function() {
            const scene = document.querySelector('a-scene');
            
            // A-Frameのスクリーンショット機能でAR画像をキャプチャ
            if (!scene.components.screenshot) {
                alert('スクリーンショット機能が準備中です。少し待ってから再度お試しください。');
                return;
            }
            const targetCanvas = scene.components.screenshot.getCanvas('perspective');
            const video = document.querySelector('video');

            if (!video) {
                alert('カメラ映像が見つかりません。サイトのカメラ権限を許可してください。');
                return;
            }

            // 合成用のキャンバスを作成
            const mergeCanvas = document.createElement('canvas');
            
            // スマホ画面の実際の表示サイズを取得
            const width = window.innerWidth;
            const height = window.innerHeight;
            
            mergeCanvas.width = width;
            mergeCanvas.height = height;
            
            const ctx = mergeCanvas.getContext('2d');

            // 1. 背景のカメラ映像を描画（縦横比を保って画面いっぱいに広げる）
            const videoWidth = video.videoWidth;
            const videoHeight = video.videoHeight;
            const videoAspectRatio = videoWidth / videoHeight;
            const canvasAspectRatio = width / height;

            let drawWidth, drawHeight, drawX, drawY;
            if (videoAspectRatio > canvasAspectRatio) {
                drawHeight = height;
                drawWidth = drawHeight * videoAspectRatio;
                drawX = (width - drawWidth) / 2;
                drawY = 0;
            } else {
                drawWidth = width;
                drawHeight = drawWidth / videoAspectRatio;
                drawX = 0;
                drawY = (height - drawHeight) / 2;
            }
            ctx.drawImage(video, drawX, drawY, drawWidth, drawHeight);

            // 2. その上にAR画像を描画（ぴったり重ねる）
            ctx.drawImage(targetCanvas, 0, 0, width, height);

            // 画像としてダウンロード保存
            try {
                const imgData = mergeCanvas.toDataURL('image/png');
                const link = document.createElement('a');
                link.download = 'ar-photo_' + Date.now() + '.png';
                link.href = imgData;
                link.click();
            } catch (e) {
                // 一部スマホブラウザ向けのフォールバック（別タブで画像を開く）
                try {
                    const imgData = mergeCanvas.toDataURL('image/png');
                    window.open(imgData, '_blank');
                } catch(err) {
                    alert('保存に失敗しました。スマートフォンの通常のスクリーンショット機能をご利用ください。');
                }
            }
        });
    </script>
</body>
</html>
