<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <title>画像ARビューアー（移動・回転・拡大縮小版）</title>
    
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; }
        /* 撮影ボタンのスタイル */
        #snap-btn {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 75px;
            height: 75px;
            background-color: rgba(255, 255, 255, 0.6);
            border: 6px solid #fff;
            border-radius: 50%;
            z-index: 999;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.4);
            transition: all 0.2s ease;
        }
        #snap-btn:active {
            background-color: rgba(255, 255, 255, 0.9);
            transform: translateX(-50%) scale(0.9);
        }
    </style>
</head>
<body>

    <button id="snap-btn" title="写真を撮影"></button>

    <a-scene 
        embedded 
        arjs="sourceType: webcam; debugUIEnabled: false;" 
        renderer="preserveDrawingBuffer: true; antialias: true; alpha: true;">
        
        <a-assets>
            <img id="sakura-img" src="sakura.png">
        </a-assets>

        <a-image 
            id="ar-object"
            src="#sakura-img" 
            position="0 0 -4" 
            width="2" 
            height="2">
        </a-image>

        <a-entity camera></a-entity>
    </a-scene>

    <script>
        // ==========================================
        // 1. 指での操作（回転・拡大縮小・移動）の実装
        // ==========================================
        const arObject = document.getElementById('ar-object');
        
        // 操作用の変数
        let initialTouchDist = 0;
        let initialScale = { x: 1, y: 1 };
        let initialTouchX = 0;
        let initialRotation = 0;
        
        // 【新機能】移動用の変数
        let initialObjectPos = { x: 0, y: 0, z: -4 };
        let initialTouchPos3 = { x: 0, y: 0 };

        window.addEventListener('touchstart', function(e) {
            if (e.touches.length === 1) {
                // 1本指：回転の準備
                initialTouchX = e.touches[0].clientX;
                initialRotation = arObject.getAttribute('rotation').y;
            } else if (e.touches.length === 2) {
                // 2本指：拡大縮小の準備
                initialTouchDist = Math.hypot(
                    e.touches[0].clientX - e.touches[1].clientX,
                    e.touches[0].clientY - e.touches[1].clientY
                );
                const currentScale = arObject.getAttribute('scale') || { x: 1, y: 1, z: 1 };
                initialScale = { x: currentScale.x, y: currentScale.y };
            } else if (e.touches.length === 3) {
                // 3本指：上下左右移動の準備
                // 3つの指の平均座標を取得
                initialTouchPos3.x = (e.touches[0].clientX + e.touches[1].clientX + e.touches[2].clientX) / 3;
                initialTouchPos3.y = (e.touches[0].clientY + e.touches[1].clientY + e.touches[2].clientY) / 3;
                
                const currentPos = arObject.getAttribute('position') || { x: 0, y: 0, z: -4 };
                initialObjectPos = { x: currentPos.x, y: currentPos.y, z: currentPos.z };
            }
        });

        window.addEventListener('touchmove', function(e) {
            if (e.touches.length === 1 && initialTouchX !== 0) {
                // 1本指スワイプ：水平回転
                const deltaX = e.touches[0].clientX - initialTouchX;
                const newRotation = initialRotation + deltaX * 0.5;
                arObject.setAttribute('rotation', `0 ${newRotation} 0`);
                
            } else if (e.touches.length === 2 && initialTouchDist !== 0) {
                // 2本指ピンチ：拡大縮小
                const currentDist = Math.hypot(
                    e.touches[0].clientX - e.touches[1].clientX,
                    e.touches[0].clientY - e.touches[1].clientY
                );
                const factor = currentDist / initialTouchDist;
                
                let newScaleX = Math.max(0.2, Math.min(5.0, initialScale.x * factor));
                let newScaleY = Math.max(0.2, Math.min(5.0, initialScale.y * factor));
                
                arObject.setAttribute('scale', `${newScaleX} ${newScaleY} 1`);
                
            } else if (e.touches.length === 3) {
                // 3本指スワイプ：上下左右移動
                const currentTouchX = (e.touches[0].clientX + e.touches[1].clientX + e.touches[2].clientX) / 3;
                const currentTouchY = (e.touches[0].clientY + e.touches[1].clientY + e.touches[2].clientY) / 3;
                
                // 動かした距離を計算
                const deltaX = currentTouchX - initialTouchPos3.x;
                const deltaY = currentTouchY - initialTouchPos3.y;
                
                // 画面上のピクセル移動量をAR空間の距離に変換（0.01は移動速度の感度調整）
                const newX = initialObjectPos.x + (deltaX * 0.01);
                const newY = initialObjectPos.y - (deltaY * 0.01); // Y軸は画面と逆方向になるためマイナス
                
                arObject.setAttribute('position', `${newX} ${newY} ${initialObjectPos.z}`);
            }
        });

        window.addEventListener('touchend', function(e) {
            if (e.touches.length < 3) {
                initialTouchPos3 = { x: 0, y: 0 };
            }
            if (e.touches.length < 2) {
                initialTouchDist = 0;
            }
            if (e.touches.length < 1) {
                initialTouchX = 0;
            }
        });


        // ==========================================
        // 2. 写真撮影（キャプチャ）の処理
        // ==========================================
        document.getElementById('snap-btn').addEventListener('click', function() {
            const scene = document.querySelector('a-scene');
            
            if (!scene.components.screenshot) {
                alert('AR機能の読み込み中です。数秒待ってからもう一度押してください。');
                return;
            }
            
            const targetCanvas = scene.components.screenshot.getCanvas('perspective');
            const video = document.querySelector('video');

            if (!video) {
                alert('カメラ映像が取得できません。');
                return;
            }

            const mergeCanvas = document.createElement('canvas');
            const width = window.innerWidth;
            const height = window.innerHeight;
            mergeCanvas.width = width;
            mergeCanvas.height = height;
            const ctx = mergeCanvas.getContext('2d');

            const videoWidth = video.videoWidth;
            const videoHeight = video.videoHeight;
            const videoAspectRatio = videoWidth / videoHeight;
            const canvasAspectRatio = width / height;

            let drawWidth, drawHeight, drawX, drawY;
            if (videoAspectRatio > canvasAspectRatio) {
                drawHeight = height;
                drawWidth = drawHeight * videoAspectRatio;
                drawX = (width - drawWidth) / 2;
                drawY = 0;
            } else {
                drawWidth = width;
                drawHeight = drawWidth / videoAspectRatio;
                drawX = 0;
                drawY = (height - drawHeight) / 2;
            }
            ctx.drawImage(video, drawX, drawY, drawWidth, drawHeight);
            ctx.drawImage(targetCanvas, 0, 0, width, height);

            try {
                const imgData = mergeCanvas.toDataURL('image/png');
                const link = document.createElement('a');
                link.download = 'ar-photo_' + Date.now() + '.png';
                link.href = imgData;
                link.click();
            } catch (e) {
                try {
                    const imgData = mergeCanvas.toDataURL('image/png');
                    const newTab = window.open();
                    newTab.document.body.innerHTML = `<img src="${imgData}" style="width:100%;">`;
                } catch(err) {
                    alert('自動保存が制限されました。スマートフォンのスクリーンショット機能で撮影してください。');
                }
            }
        });
    </script>
</body>
</html>
