<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <title>画像ARビューアー（操作カスタム版）</title>
    
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    
    <style>
        /* スマホ画面のスクロールや引っ張ってリフレッシュを完全に禁止する */
        html, body { 
            margin: 0; 
            overflow: hidden; 
            font-family: sans-serif;
            width: 100%;
            height: 100%;
            position: fixed;
            touch-action: none;
        }
        /* 撮影ボタンのスタイル */
        #snap-btn {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 75px;
            height: 75px;
            background-color: rgba(255, 255, 255, 0.6);
            border: 6px solid #fff;
            border-radius: 50%;
            z-index: 999;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.4);
            transition: all 0.2s ease;
        }
        #snap-btn:active {
            background-color: rgba(255, 255, 255, 0.9);
            transform: translateX(-50%) scale(0.9);
        }
    </style>
</head>
<body>

    <button id="snap-btn" title="写真を撮影"></button>

    <a-scene 
        embedded 
        arjs="sourceType: webcam; debugUIEnabled: false;" 
        renderer="preserveDrawingBuffer: true; antialias: true; alpha: true;">
        
        <a-assets>
            <img id="sakura-img" src="sakura.png">
        </a-assets>

        <a-image 
            id="ar-object"
            src="#sakura-img" 
            position="0 0 -4" 
            width="2" 
            height="2"
            rotation="0 0 0">
        </a-image>

        <a-entity camera></a-entity>
    </a-scene>

    <script>
        // ==========================================
        // 1. 指定の指操作（1本回転・2本拡大縮小・3本移動）
        // ==========================================
        const arObject = document.getElementById('ar-object');
        
        // 1本指（回転）用変数
        let startX = 0;
        let startRotationY = 0;
        
        // 2本指（拡大縮小）用変数
        let startDist = 0;
        let startScaleX = 1, startScaleY = 1;

        // 3本指（移動）用変数
        let startObjX = 0, startObjY = 0;
        let startTouchPos3 = { x: 0, y: 0 };

        // ブラウザのデフォルト挙動（引っ張ってリフレッシュ等）を完全に阻止
        window.addEventListener('touchmove', function(e) {
            e.preventDefault();
        }, { passive: false });

        window.addEventListener('touchstart', function(e) {
            if (e.touches.length === 1) {
                // 【1本指】回転の開始位置を記録
                startX = e.touches[0].clientX;
                const currentRot = arObject.getAttribute('rotation') || { x: 0, y: 0, z: 0 };
                startRotationY = currentRot.y;
            } 
            else if (e.touches.length === 2) {
                // 【2本指】拡大縮小の準備
                startDist = Math.hypot(
                    e.touches[0].clientX - e.touches[1].clientX,
                    e.touches[0].clientY - e.touches[1].clientY
                );
                const currentScale = arObject.getAttribute('scale') || { x: 1, y: 1, z: 1 };
                startScaleX = currentScale.x;
                startScaleY = currentScale.y;
            }
            else if (e.touches.length === 3) {
                // 【3本指】上下左右移動の準備（3つの指の平均座標を取得）
                startTouchPos3.x = (e.touches[0].clientX + e.touches[1].clientX + e.touches[2].clientX) / 3;
                startTouchPos3.y = (e.touches[0].clientY + e.touches[1].clientY + e.touches[2].clientY) / 3;
                
                const currentPos = arObject.getAttribute('position') || { x: 0, y: 0, z: -4 };
                startObjX = currentPos.x;
                startObjY = currentPos.y;
            }
        });

        window.addEventListener('touchmove', function(e) {
            if (e.touches.length === 1 && startX !== 0) {
                // 【1本指スワイプ】左右で水平回転
                const deltaX = e.touches[0].clientX - startX;
                const newRotationY = startRotationY + (deltaX * 0.5); // 0.5は回転速度の調整
                arObject.setAttribute('rotation', `0 ${newRotationY} 0`);
            } 
            else if (e.touches.length === 2 && startDist !== 0) {
                // 【2本指ピンチ】拡大縮小（ひねり回転はしません）
                const currentDist = Math.hypot(
                    e.touches[0].clientX - e.touches[1].clientX,
                    e.touches[0].clientY - e.touches[1].clientY
                );
                const factor = currentDist / startDist;
                let newScaleX = Math.max(0.2, Math.min(5.0, startScaleX * factor));
                let newScaleY = Math.max(0.2, Math.min(5.0, startScaleY * factor));
                arObject.setAttribute('scale', `${newScaleX} ${newScaleY} 1`);
            }
            else if (e.touches.length === 3 && startTouchPos3.x !== 0) {
                // 【3本指スワイプ】上下左右の並行移動
                const currentTouchX = (e.touches[0].clientX + e.touches[1].clientX + e.touches[2].clientX) / 3;
                const currentTouchY = (e.touches[0].clientY + e.touches[1].clientY + e.touches[2].clientY) / 3;
                
                const deltaX = currentTouchX - startTouchPos3.x;
                const deltaY = currentTouchY - startTouchPos3.y;
                
                // 3本指移動が快適になるよう感度を調整（0.012）
                const newX = startObjX + (deltaX * 0.012);
                const newY = startObjY - (deltaY * 0.012); // Y軸は上下反転
                
                arObject.setAttribute('position', `${newX} ${newY} -4`);
            }
        });

        window.addEventListener('touchend', function(e) {
            // 指が離れたらそれぞれの数に応じて状態をリセット
            if (e.touches.length < 3) {
                startTouchPos3 = { x: 0, y: 0 };
            }
